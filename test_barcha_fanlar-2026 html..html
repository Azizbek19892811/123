<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e17">
<title>KM IQ uz II - Testlar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0e17;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--text:#fffffe;--text2:#a7a9be;--accent:#7c5cbf;--accent2:#9b79e0;--success:#2cb67d;--danger:#ef4565;--radius:16px;--radius-sm:12px}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex-direction:column;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}
.subjects-screen{padding:1.5rem 1.25rem;gap:1rem;align-items:stretch}
.app-logo{font-size:48px;text-align:center;margin-bottom:0.25rem}
.app-title{font-size:22px;font-weight:800;text-align:center;background:linear-gradient(135deg,#9b79e0,#7c5cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.25rem}
.app-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:0.5rem}
.subjects-grid{display:flex;flex-direction:column;gap:10px;width:100%}
.subject-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.subject-card:active{transform:scale(0.97);border-color:var(--accent)}
.subject-emoji{font-size:32px;flex-shrink:0}
.subject-info{flex:1}
.subject-name{font-size:15px;font-weight:800;color:var(--text)}
.subject-meta{font-size:12px;color:var(--text2);margin-top:2px}
.subject-arrow{color:var(--accent2);font-size:20px;font-weight:800}
.start-screen{justify-content:center;align-items:center;padding:2rem 1.5rem;gap:1.5rem}
.emoji-big{font-size:64px;text-align:center}
.screen-title{font-size:24px;font-weight:800;text-align:center;background:linear-gradient(135deg,#9b79e0,#7c5cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-sub2{font-size:14px;color:var(--text2);text-align:center}
.info-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;justify-content:space-between;align-items:center}
.info-label{font-size:14px;color:var(--text2)}
.info-val{font-size:15px;font-weight:700;color:var(--accent2)}
.btn-start{width:100%;background:linear-gradient(135deg,#7c5cbf,#5a3fa0);border:none;border-radius:var(--radius);padding:18px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:white;cursor:pointer;box-shadow:0 8px 32px rgba(124,92,191,0.4);transition:transform 0.15s}
.btn-start:active{transform:scale(0.97)}
.btn-back{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text2);cursor:pointer}
.test-header{padding:1rem 1.25rem 0.75rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-counter{font-size:13px;color:var(--text2);font-weight:600}
.score-pill{background:rgba(124,92,191,0.2);color:var(--accent2);font-size:13px;font-weight:700;padding:4px 12px;border-radius:99px;border:1px solid rgba(124,92,191,0.3)}
.progress-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c5cbf,#9b79e0);border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.test-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.question-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.question-label{font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.question-text{font-size:16px;font-weight:600;line-height:1.6;color:var(--text)}
.options-list{display:flex;flex-direction:column;gap:10px}
.option{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.option:active{transform:scale(0.98)}
.option.correct{border-color:var(--success);background:rgba(44,182,125,0.15)}
.option.wrong{border-color:var(--danger);background:rgba(239,69,101,0.15)}
.option-badge{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);flex-shrink:0;transition:all 0.15s}
.option.correct .option-badge{background:var(--success);color:white}
.option.wrong .option-badge{background:var(--danger);color:white}
.option-text{font-size:15px;font-weight:600;line-height:1.4;color:var(--text)}
.option.correct .option-text{color:var(--success);font-weight:800}
.option.wrong .option-text{color:var(--danger);font-weight:800}
.test-footer{padding:1rem 1.25rem;padding-bottom:max(1rem,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.btn-ghost{flex:1;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.15s}
.btn-next{flex:2;background:linear-gradient(135deg,#7c5cbf,#5a3fa0);border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(124,92,191,0.35);transition:all 0.15s}
.btn-next:active,.btn-ghost:active{transform:scale(0.97)}
.result-screen{justify-content:center;align-items:center;padding:2rem 1.5rem;gap:1.25rem}
.result-emoji-big{font-size:72px;text-align:center;animation:pop 0.4s cubic-bezier(.17,.67,.4,1.3)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.result-pct{font-size:52px;font-weight:800;text-align:center;background:linear-gradient(135deg,#9b79e0,#7c5cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-msg{font-size:16px;color:var(--text2);text-align:center;font-weight:600}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.stat-label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:800}
.stat-val.green{color:var(--success)}
.stat-val.red{color:var(--danger)}
.btn-restart{width:100%;background:linear-gradient(135deg,#7c5cbf,#5a3fa0);border:none;border-radius:var(--radius);padding:18px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;color:white;cursor:pointer;box-shadow:0 8px 32px rgba(124,92,191,0.4);transition:transform 0.15s}
.btn-restart:active{transform:scale(0.97)}
.btn-home{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text2);cursor:pointer}
</style>
</head>
<body>

<!-- FAN TANLASH -->
<div class="screen subjects-screen active" id="subjects-screen">
  <div class="app-logo">🎓</div>
  <div class="app-title">KM IQ uz II</div>
  <p class="app-sub">Fanlardan birini tanlang</p>
  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<!-- START -->
<div class="screen start-screen" id="start-screen">
  <div class="emoji-big" id="start-emoji">📝</div>
  <div class="screen-title" id="start-title">Fan nomi</div>
  <p class="app-sub2">Kasbiy kompetentlik testi</p>
  <div class="info-card">
    <div class="info-row"><span class="info-label">Jami savollar</span><span class="info-val" id="start-count">0 ta</span></div>
    <div class="info-row"><span class="info-label">Fan</span><span class="info-val" id="start-fan">-</span></div>
    <div class="info-row"><span class="info-label">Muallif</span><span class="info-val" id="start-author">-</span></div>
  </div>
  <button class="btn-start" onclick="startTest()">🚀 Testni boshlash</button>
  <button class="btn-back" onclick="showScreen('subjects-screen')">← Orqaga</button>
</div>

<!-- TEST -->
<div class="screen" id="test-screen">
  <div class="test-header">
    <div class="header-top">
      <span class="q-counter" id="q-counter">1 / 0</span>
      <span class="score-pill" id="score-live">⭐ 0 ball</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>
  <div class="test-content">
    <div class="question-box">
      <div class="question-label">Savol</div>
      <p class="question-text" id="question-text"></p>
    </div>
    <div class="options-list" id="options-container"></div>
  </div>
  <div class="test-footer">
    <button class="btn-ghost" onclick="showScreen('subjects-screen')">↩ Chiqish</button>
    <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none">Keyingisi →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen result-screen" id="result-screen">
  <div class="result-emoji-big" id="result-emoji">🏆</div>
  <div class="result-pct" id="final-score">0%</div>
  <p class="result-msg" id="final-message"></p>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-label">To'g'ri</div><div class="stat-val green" id="correct-count">0</div></div>
    <div class="stat-box"><div class="stat-label">Xato</div><div class="stat-val red" id="wrong-count">0</div></div>
    <div class="stat-box"><div class="stat-label">Jami</div><div class="stat-val" id="total-count">0</div></div>
  </div>
  <button class="btn-restart" onclick="startTest()">🔄 Qayta urinish</button>
  <button class="btn-home" onclick="showScreen('subjects-screen')">🏠 Fanlar ro'yxati</button>
</div>

<script>
const SUBJECTS = [{"title": "Akademik Ko'nikmalar", "author": "Umarova H.", "emoji": "📝", "questions": [{"q": "Hard-skills , ya'ni  kasbiy ko'nikmalar uzoq muddatli va barqaror muvaffaqiyatining qanday qismini egallaydi?", "opts": ["30%", "50%", "75%", "25%"], "ans": 3}, {"q": "Soft-skills , ya'ni  moslashuvchan ko'nikmalar uzoq muddatli va barqaror muvaffaqiyatining qanday qismini egallaydi?", "opts": ["30%", "50%", "75%", "25%"], "ans": 2}, {"q": "Birgalikda o‘rganishning asosiy afzalligi nima?", "opts": ["Marketing strategiyalarini ishlab chiqish", "Vizual ma'lumotlarni loyihalashni soddalashtirish", "Akademik samardorlik va tanqidiy fikrlashni kuchaytiradi", "Byudjetni tejash va xarajatlarni qisqartirish"], "ans": 2}, {"q": "Kasbiy kompetentlikning eng muhim tarkibiy qismi nima?", "opts": ["Bo‘sh vaqtni to‘g‘ri tashkil etish", "Amaliy tajriba va kasbiy bilimlar", "Aqliy  qobiliyatlari", "Shaxsiy kompetentlik va ijtimoiy munosabatlar"], "ans": 1}, {"q": "Birlamchi manbalar qanday xususiyatga ega?", "opts": ["Asl ma'lumotlarni o‘z ichiga olib, tahlil qilinmagan yoki talqin qilinmagan bo‘ladi", "Ilmiy natijalarini  tahlil qilish va o'z ishida foydalanish uchun talqin qilinadi", "Birlamchi manbalardan olingan ma'lumotlarning kengayishi sifatida shakllanadi", "Guruh loyihalarini tashkil etish uchun talqin qilinadi"], "ans": 0}, {"q": "… - oliy ta’lim yo‘nalishlaridan biri bo‘yicha chuqurlashtirilgan bilim, malaka va ko‘nikmalar beradigan, o‘qish davomiyligi kamida uch yil bo‘lgan tayanch oliy ta’limdir", "opts": ["Bakalavriat", "Oliy ta'limdan keyingi ta'lim", "Qayta tayyorlash", "Magistratura"], "ans": 0}, {"q": "Biometrik autentifikatsiya usullariga qaysi biri kiradi?", "opts": ["Telefon raqami orqali tasdiqlash", "Parol bilan tizimga kirish", "Barmoq izi, yuzni aniqlash va ovoz tanish texnologiyalari", "Shaxsiy kodlardan foydalanish"], "ans": 2}, {"q": "Amalda kompetentlik nima?", "opts": ["ish  faoliyatiga nisbatan tanqidiy va ijodiy yondoshish, o‘zining ijodkorlik malakalariga egaligini namoyish eta olish", "axborot muhitida zarur, muhim, kerakli, foydali m a’lumotlarni izlash, yig‘ish, saralash, qayta ishlash va ulardan maqsadli, o‘rinli, samarali foydalanish", "ish  jarayonida sog‘lom psixologik muhitni yarata olish, hamkasblar va rahbariyat  bilan ijobiy muloqotni tashkil etish, turli salbiy psixologik ziddiyatlarni o‘z vaqtida anglay olish va bartaraf eta olish;", "bilim mahsuli bo‘lib, amaliyotda qo‘llay bilish qobiliyati"], "ans": 3}, {"q": "Kasbiy kompetentlikning qanday asosiy komponentlardan iborat?", "opts": ["Kasbiy bilim  va tajriba", "Axborotni izlash, saralash va tahlil qilish", "Bilim, ko'nikma, malaka", "Ijtimoiy kompetentlik"], "ans": 2}, {"q": "Akademik yozishda rasmiy tilni qo‘llash nima uchun muhim?", "opts": ["Fikrlarni aniq, professional va ilmiy tarzda ifodalashni ta'minlaydi", "Tahlil qilish, muammolarni hal qilish, ma'lumotlarni izlash va texnologiyalarni qo‘llashni o‘z ichiga oladi", "Mavzuni tanlash va ma'lumotlarni to‘plash orqali yozuvning asosini shakllantiradi", "Mavzuga doir adabiyotlarni qidirib o'qish va ularni tanqidiy o'qishni shakllantiradi"], "ans": 0}, {"q": "Axborotning cheksizlik belgisi qanday ifodalanadi?", "opts": ["Ilmiy loyihalar cheklanmagan holda vizual tahlil qilinishida ifodalanadi", "Foydalanuvchilar soni cheklanmagan holda o‘zgarmay uzatilishida ifodalanadi", "Tashkilotning moliyaviy resurslari cheklanmagan holda taqsimlanishida ifodalanadi", "Guruh loyihalari cheklanmagan holda tashkil etilishida ifodalanadi"], "ans": 1}, {"q": "Akademik yozishda tahrir qilishning ahamiyati nima?", "opts": ["Yozuvni jozibadorligi va sifatini oshirishga yordam beradi", "Ilmiy loyihalarni tahlil qilish sifatini oshirishga yordam beradi", "Grammatik  qoidalariga rioya qilish sifatini oshirishga yordam beradi", "Grammatika, uslub va mazmunni tahlil qilib, yozuv sifatini oshirishga yordam beradi"], "ans": 3}, {"q": "Akademik yozish qanday ta’riflanadi?", "opts": ["Mavzuga doir adabiyotlarni q let currentSubject=null, questions=[], current=0, score=0, answered=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildSubjectCards(){
  const grid=document.getElementById('subjects-grid');
  grid.innerHTML='';
  SUBJECTS.forEach((sub,idx)=>{
    const card=document.createElement('div');
    card.className='subject-card';
    card.innerHTML=`<span class="subject-emoji">${sub.emoji}</span><div class="subject-info"><div class="subject-name">${sub.title}</div><div class="subject-meta">${sub.questions.length} ta savol &nbsp;•&nbsp; ${sub.author}</div></div><span class="subject-arrow">›</span>`;
    card.onclick=()=>selectSubject(idx);
    grid.appendChild(card);
  });
}

  document.getElementById('start-emoji').textContent=currentSubject.emoji;
  document.getElementById('start-title').textContent=currentSubject.title;
  document.getElementById('start-count').textContent=currentSubject.questions.length+' ta';
  document.getElementById('start-fan').textContent=currentSubject.title;
  document.getElementById('start-author').textContent=currentSubject.author;
  showScreen('start-screen');
}

function startTest(){
  // Savollarni aralashtirish, lekin har safar yangi tartibda
  questions=[...currentSubject.questions].sort(()=>Math.random()-0.5);
  current=0; score=0; answered=false;
  showScreen('test-screen');
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('q-counter').textContent=(current+1)+' / '+questions.length;
  document.getElementById('score-live').textContent='⭐ '+score+' ball';
  document.getElementById('progress').style.width=(current/questions.length*100)+'%';
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('next-btn').style.display='none';
  const cont=document.getElementById('options-container');
  cont.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const div=document.createElement('div');
    div.className='option';
    const labels=['A','B','C','D'];
    div.innerHTML=`<span class="option-badge">${labels[i]}</span><span class="option-text">${opt}</span>`;
    div.onclick=()=>selectAnswer(i,div);
    cont.appendChild(div);
  });
  document.querySelector('.test-content').scrollTop=0;
}

function selectAnswer(idx,el){
  if(answered)return;
  answered=true;
  const correct=questions[current].ans;
  document.querySelectorAll('.option').forEach((opt,i)=>{
    if(i===correct)opt.classList.add('correct');
    else if(i===idx&&idx!==correct)opt.classList.add('wrong');
    opt.style.cursor='default';
  });
  if(idx===correct)score++;
  document.getElementById('score-live').textContent='⭐ '+score+' ball';
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  current++;
  if(current>=questions.length)showResult();
  else showQuestion();
}

function showResult(){
  showScreen('result-screen');
  const pct=Math.round(score/questions.length*100);
  document.getElementById('final-score').textContent=pct+'%';
  document.getElementById('correct-count').textContent=score;
  document.getElementById('wrong-count').textContent=questions.length-score;
  document.getElementById('total-count').textContent=questions.length;
  const emoji=pct>=90?'🏆':pct>=70?'🎯':pct>=50?'📚':'💪';
  const msg=pct>=90?"Ajoyib! Siz zo'rsiz!":pct>=70?"Yaxshi natija!":pct>=50?"O'rtacha, davom eting!":"Qayta o'rganing!";
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('final-message').textContent=msg;
}

buildSubjectCards();
</script>
